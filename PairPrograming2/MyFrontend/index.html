<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="style.css">
    <title>簡易ToDoアプリ</title>
</head>
<body>

    <h1>ToDo管理システム</h1>

    <!-- タスク一覧 -->
    <div id="task-list">

    <div class="task-item">
        <input type="checkbox" class="task-status-check" data-id="1">
        <span class="task-title">発表資料作成</span>

        <select class="task-priority-select" data-id="1">
            <option value="1" selected>高</option>
            <option value="2">中</option>
            <option value="3">低</option>
        </select>

        <button class="btn-delete-task" data-id="1">削除</button>
    </div>

    <div class="task-item">
        <input type="checkbox" class="task-status-check" data-id="2" checked>
        <span class="task-title">API実装</span>

        <select class="task-priority-select" data-id="2">
            <option value="1">高</option>
            <option value="2" selected>中</option>
            <option value="3">低</option>
        </select>

        <button class="btn-delete-task" data-id="2">削除</button>
    </div>

    <div class="task-item">
        <input type="checkbox" class="task-status-check" data-id="3">
        <span class="task-title">画面デザイン調整</span>

        <select class="task-priority-select" data-id="3">
            <option value="1">高</option>
            <option value="2">中</option>
            <option value="3" selected>低</option>
        </select>

        <button class="btn-delete-task" data-id="3">削除</button>
    </div>

    <!-- 新規登録エリア -->
    <div class="add-area">

        <input
            type="text"
            id="new-task-title"
            maxlength="30"
            placeholder="タスク名を入力">

        <select id="new-task-priority">
            <option value="1">高</option>
            <option value="2">中</option>
            <option value="3">低</option>
        </select>

        <button id="add-task-btn">
            登録
        </button>

    </div>

</body>
</html>
